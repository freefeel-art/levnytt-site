name: Generate Homepage & Article Index

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run homepage generator
        run: python3 scripts/generate-homepage.py

      - name: Run article index generator
        run: python3 scripts/generate-article-index.py

      - name: Commit updated pages if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          CHANGED=false
          if ! git diff --quiet index.html; then
            git add index.html
            CHANGED=true
          fi
          if ! git diff --quiet artiklar.html; then
            git add artiklar.html
            CHANGED=true
          fi
          if [ "$CHANGED" = true ]; then
            git commit -m "chore: auto-update homepage & article index [skip ci]"
            git push
          else
            echo "No changes — skipping commit"
          fi
