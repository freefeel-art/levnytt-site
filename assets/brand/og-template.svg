<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- LevNytt Open Graph Brand Template — Social Sharing Identity -->
  <!-- Derived from: lv-brand-mark.svg, editorial-watermark.svg -->
  <!--
    USAGE:
      Replace [CATEGORY], [LINE 1], [LINE 2] with per-article values.
      Adjust line count (1-3 lines) as needed.
      Keep LV Brand Mark and watermark unchanged.
  -->

  <defs>
    <!-- LV Brand Mark (from lv-brand-mark.svg) -->
    <g id="lv-mark">
      <circle cx="50" cy="50" r="48" fill="#1B4332" stroke="#E8C870" stroke-width="3"/>
      <text x="50" y="65" text-anchor="middle"
            font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
            font-size="46" font-weight="400" fill="#E8C870" letter-spacing="-3.5">LV</text>
    </g>

    <!-- Editorial Watermark (from editorial-watermark.svg) -->
    <g id="watermark">
      <circle cx="200" cy="200" r="155" fill="none" stroke="#1B4332" stroke-width="1.5"/>
      <!-- North America -->
      <path d="M 70 130 Q 95 100 125 110 Q 140 100 148 120 Q 155 135 150 160 Q 145 190 130 205 Q 110 200 100 185 Q 80 175 70 155 Z" fill="#1B4332" opacity="0.75"/>
      <!-- South America -->
      <path d="M 108 215 Q 125 205 135 220 Q 148 255 140 285 Q 135 315 118 325 Q 108 315 98 285 Q 88 255 95 230 Z" fill="#1B4332" opacity="0.7"/>
      <!-- Eurasia -->
      <path d="M 190 70 Q 235 60 275 75 Q 310 90 320 120 Q 335 150 315 170 Q 305 185 285 180 Q 260 195 240 185 Q 215 200 200 180 Q 190 165 195 140 Q 185 115 190 90 Z" fill="#1B4332" opacity="0.75"/>
      <!-- Africa -->
      <path d="M 212 195 Q 235 190 255 205 Q 270 225 275 255 Q 278 285 262 300 Q 245 290 232 265 Q 220 240 212 215 Z" fill="#1B4332" opacity="0.7"/>
      <!-- Australia -->
      <path d="M 290 315 Q 305 310 318 320 Q 325 338 312 348 Q 295 352 282 342 Q 275 328 290 315 Z" fill="#1B4332" opacity="0.65"/>
      <!-- Leaf 1 -->
      <path d="M 88 285 C 55 315 20 345 12 385 C 55 365 78 335 90 308 Z" fill="#1B4332" opacity="0.8"/>
      <path d="M 88 285 C 55 320 30 355 12 385" fill="none" stroke="#E8C870" stroke-width="1.2" opacity="0.5" stroke-linecap="round"/>
      <!-- Leaf 2 -->
      <path d="M 72 300 C 35 315 10 335 5 368 C 35 348 55 328 76 318 Z" fill="#1B4332" opacity="0.75"/>
      <path d="M 72 300 C 38 318 18 340 5 368" fill="none" stroke="#E8C870" stroke-width="1" opacity="0.45" stroke-linecap="round"/>
      <!-- Leaf 3 -->
      <path d="M 62 278 C 35 268 12 262 5 285 C 28 282 48 285 66 292 Z" fill="#1B4332" opacity="0.7"/>
      <path d="M 62 278 C 35 272 18 272 5 285" fill="none" stroke="#E8C870" stroke-width="0.8" opacity="0.4" stroke-linecap="round"/>
      <!-- LV monogram in watermark -->
      <text x="258" y="283" text-anchor="middle"
            font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
            font-size="28" font-weight="400" fill="#E8C870" letter-spacing="-2.5" opacity="0.9">LV</text>
    </g>
  </defs>

  <!-- Background — Cream -->
  <rect width="1200" height="630" fill="#FAF7F0"/>

  <!-- Editorial Watermark — right side, 11 % opacity (within 10–12 % range) -->
  <use href="#watermark" transform="translate(650, 65) scale(1.25)" opacity="0.11"/>

  <!-- LV Brand Mark — upper-left corner -->
  <use href="#lv-mark" transform="translate(60, 60) scale(0.8)"/>

  <!-- Category label — uppercase, Gold, small -->
  <text x="80" y="210"
        font-family="Inter, Arial, sans-serif"
        font-size="14" font-weight="600" fill="#E8C870"
        letter-spacing="3.5">GUIDE</text>

  <!-- Headline — large editorial title, Deep Green, max 3 lines -->
  <text x="80"
        font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
        font-size="50" font-weight="600" fill="#1B4332">
    <tspan x="80" dy="276">D-vitamin: Allt du behöver</tspan>
    <tspan x="80" dy="60">veta om solskensvitaminet</tspan>
  </text>

  <!-- Thin divider -->
  <line x1="80" y1="540" x2="1120" y2="540" stroke="#1B4332" stroke-width="1" opacity="0.12"/>

  <!-- Footer wordmark -->
  <text x="80" y="585"
        font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
        font-size="20" font-weight="400">
    <tspan fill="#1B4332">Lev</tspan>
    <tspan fill="#E8C870">Nytt</tspan>
  </text>

  <!-- URL -->
  <text x="1120" y="585" text-anchor="end"
        font-family="Inter, Arial, sans-serif"
        font-size="14" fill="#1A1A1A" fill-opacity="0.4" letter-spacing="1">levnytt.se</text>
</svg>
