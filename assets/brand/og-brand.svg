<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- LevNytt OG Brand Image -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d2218"/>
      <stop offset="100%" stop-color="#1B4332"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Subtle watermark -->
  <g opacity="0.04">
    <rect x="300" y="150" width="80" height="340" rx="12" fill="#E8C870"/>
    <rect x="300" y="440" width="200" height="50" rx="12" fill="#E8C870"/>
    <rect x="550" y="150" width="60" height="350" rx="12" fill="#E8C870" transform="rotate(14 580 150)"/>
    <rect x="780" y="150" width="60" height="350" rx="12" fill="#E8C870" transform="rotate(-14 810 150)"/>
  </g>
  <!-- Main LV Mark -->
  <g transform="translate(480, 100) scale(2.4)">
    <rect x="20" y="18" width="14" height="62" rx="4" fill="#E8C870"/>
    <rect x="20" y="70" width="36" height="10" rx="4" fill="#E8C870"/>
    <rect x="56" y="18" width="10" height="64" rx="4" fill="#E8C870" transform="rotate(14 61 18)"/>
    <rect x="84" y="18" width="10" height="64" rx="4" fill="#E8C870" transform="rotate(-14 89 18)"/>
  </g>
  <!-- LevNytt text -->
  <text x="600" y="440" text-anchor="middle" font-family="Georgia, serif" font-size="56" font-weight="700" fill="#E8C870" letter-spacing="4">LevNytt</text>
  <text x="600" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.6)" letter-spacing="6">EN OBEROENDE KONSUMENTRESSURS</text>
  <!-- Bottom bar -->
  <rect x="480" y="520" width="240" height="3" rx="1.5" fill="#E8C870" opacity="0.3"/>
</svg>
