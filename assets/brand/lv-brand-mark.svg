<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- LevNytt LV Brand Mark — Primary Master Asset -->
  <!-- Outer border: Light Gold #E8C870, 3% of diameter -->
  <!-- Inner fill: Deep Green #1B4332 -->
  <!-- Monogram: LV in Playfair Display-style serif -->
  <circle cx="50" cy="50" r="48" fill="#1B4332" stroke="#E8C870" stroke-width="3"/>
  <text x="50" y="65" text-anchor="middle"
        font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
        font-size="46" font-weight="400" fill="#E8C870" letter-spacing="-3.5">LV</text>
</svg>
